name: Auto Post Articles

# 2026-04-11 質転換のためscheduleトリガ停止。手動起動のみ残す。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate articles (VR)
        env:
          API_ID: ${{ secrets.API_ID }}
          AFFILIATE_ID: ${{ secrets.AFFILIATE_ID }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
        working-directory: scripts
        run: python main.py --keyword "VR" --count 1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git diff --staged --quiet || (git commit -m "auto: 記事自動生成 $(date +%Y-%m-%d)" && git push)
      - name: Ping Google
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://musclelove-777.github.io/vr-eros/sitemap.xml"

