{{/* ページネーション2ページ目以降をnoindex */}}
{{ if and (.IsNode) (.Paginator) (gt .Paginator.PageNumber 1) }}
<meta name="robots" content="noindex, follow" />
{{ end }}

{{/* タグページをnoindex。カテゴリページは除外 */}}
{{ if and (eq .Kind "term") (eq .Data.Singular "tag") }}
<meta name="robots" content="noindex, follow" />
{{ end }}
{{ if eq .Kind "taxonomy" }}
<meta name="robots" content="noindex, follow" />
{{ end }}

{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "author": {"@type": "Organization", "name": "{{ .Site.Params.author }}"},
  "publisher": {"@type": "Organization", "name": "{{ .Site.Title }}"},
  "mainEntityOfPage": {"@type": "WebPage", "@id": "{{ .Permalink }}"}
  {{ with .Params.cover }}{{ if .image }},"image": "{{ .image }}"{{ end }}{{ end }}
}
</script>
{{ end }}
